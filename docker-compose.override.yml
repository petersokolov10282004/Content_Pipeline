# Local end-to-end testing override: real Postgres + Temporal + FFmpeg, with a
# local S3-compatible object store (MinIO) standing in for Cloudflare R2.
# Only the YouTube upload remains mocked (via the dev Spring profile).
#
# Compose auto-merges this file on top of docker-compose.yml. Remove it (or
# `docker compose -f docker-compose.yml ...`) to go back to the cloud-R2 setup.
services:
  minio:
    image: minio/minio:latest
    container_name: contentpipeline-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data

  # One-shot: wait for MinIO, then create the bucket the backend expects.
  minio-init:
    image: minio/mc:latest
    container_name: contentpipeline-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb --ignore-existing local/contentpipeline;
      mc anonymous set none local/contentpipeline;
      echo 'minio bucket ready';
      "

  backend:
    environment:
      # keep the base overrides
      - DB_URL=jdbc:postgresql://postgres:5432/contentpipeline
      - TEMPORAL_HOST=temporal:7233
      # point object storage at local MinIO instead of Cloudflare R2
      - R2_ENDPOINT=http://minio:9000
      - R2_ACCESS_KEY_ID=minioadmin
      - R2_SECRET_ACCESS_KEY=minioadmin
      - R2_BUCKET_NAME=contentpipeline
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_started

volumes:
  minio_data:
